version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL Service (Backend Database)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: secureai_postgres
    restart: always
    environment:
      # These variables will automatically map to the values in your .env file
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-secureai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # Redis Service (Caching & Rate Limiting)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: secureai_redis
    restart: always
    ports:
      - "6379:6379"

  # ----------------------------------------
  # Keycloak Service (IAM Identity Provider)
  # ----------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: secureai_keycloak
    # start-dev runs it easily without needing HTTPS or a separate external DB setup right away
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
    ports:
      - "8081:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data

  # ----------------------------------------
  # SecureAI Django Backend
  # ----------------------------------------
  backend:
    build: .
    container_name: secureai_backend
    env_file:
      - .env
    environment:
      # Override local .env values so they point to the Docker internal network hostnames
      - DB_HOST=postgres
      - REDIS_URL=redis://redis:6379/1
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
    volumes:
      # This maps your local code directly inside the container for live-reloading!
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - keycloak

# Persist data even if containers are destroyed
volumes:
  postgres_data:
  keycloak_data:
