apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend-backend:latest
        imagePullPolicy: Never 
        ports:
        - containerPort: 8000
        env:
        - name: ALLOWED_HOSTS
          value: "localhost,127.0.0.1,0.0.0.0,backend,secureai.local"
        - name: DEBUG
          value: "True"
        - name: DB_HOST
          value: "postgres"
        - name: DB_NAME
          value: "secureai_db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: DB_PASSWORD
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: REDIS_URL
        - name: KEYCLOAK_SERVER_URL
          value: "http://keycloak:8080"
        - name: KEYCLOAK_REALM
          value: "SecureAI"
        - name: KEYCLOAK_CLIENT_ID
          value: "backend-client"